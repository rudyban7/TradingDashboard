<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RB Trading | Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page">
  <div class="page-header">
    <div class="page-title">Strategy Stats</div>
    <div class="page-sub">Pulled live from your trade journal</div>
  </div>

  <div id="empty-stats" class="empty-state" style="display:none">
    <div class="empty-state-icon">📈</div>
    <div class="empty-state-title">No trades to analyse yet</div>
    <div class="empty-state-sub">Log trades in the Journal and they'll appear here automatically</div>
  </div>

  <div id="stats-content">
    <!-- Overview cards -->
    <div class="stat-cards" id="overview-cards"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px" id="direction-and-pairs">
      <!-- Direction breakdown -->
      <div class="panel">
        <div class="panel-title">BUY vs SELL</div>
        <div id="dir-stats"></div>
      </div>

      <!-- Best / worst pairs -->
      <div class="panel">
        <div class="panel-title">Pair Performance</div>
        <div id="pair-stats"></div>
      </div>
    </div>

    <!-- Result distribution -->
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-title">Result Distribution</div>
      <div id="result-dist" class="bar-chart"></div>
    </div>

    <!-- Monthly breakdown -->
    <div class="panel">
      <div class="panel-title">Monthly Breakdown</div>
      <div class="table-wrap" id="monthly-wrap">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Trades</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>B/E</th>
              <th>Win %</th>
              <th>Avg RR</th>
            </tr>
          </thead>
          <tbody id="monthly-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.getElementById('nav-placeholder').innerHTML = getNavHTML('stats');
  startClock();

  function render() {
    const trades = loadFromStorage('trades') || [];

    if (!trades.length) {
      document.getElementById('empty-stats').style.display = 'block';
      document.getElementById('stats-content').style.display = 'none';
      return;
    }
    document.getElementById('empty-stats').style.display = 'none';
    document.getElementById('stats-content').style.display = 'block';

    const total  = trades.length;
    const wins   = trades.filter(t => t.result === 'WIN').length;
    const losses = trades.filter(t => t.result === 'LOSS').length;
    const bes    = trades.filter(t => t.result === 'BE').length;
    const wr     = total > 0 ? ((wins / total) * 100).toFixed(1) : '0';
    const rrArr  = trades.filter(t => t.rr).map(t => parseFloat(t.rr));
    const avgRR  = rrArr.length ? (rrArr.reduce((a,b) => a+b, 0) / rrArr.length).toFixed(2) : '--';
    const bestRR = rrArr.length ? Math.max(...rrArr).toFixed(2) : '--';

    // ── Overview cards ──
    document.getElementById('overview-cards').innerHTML = `
      <div class="stat-card">
        <div class="stat-card-label">Total Trades</div>
        <div class="stat-card-value">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Win Rate</div>
        <div class="stat-card-value ${parseFloat(wr) >= 50 ? 'green' : 'red'}">${wr}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Avg RR</div>
        <div class="stat-card-value gold">${avgRR !== '--' ? '1:'+avgRR : '--'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Wins</div>
        <div class="stat-card-value green">${wins}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Losses</div>
        <div class="stat-card-value red">${losses}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Breakevens</div>
        <div class="stat-card-value">${bes}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Best RR</div>
        <div class="stat-card-value gold">${bestRR !== '--' ? '1:'+bestRR : '--'}</div>
      </div>
    `;

    // ── Direction breakdown ──
    const buys  = trades.filter(t => t.direction === 'BUY');
    const sells = trades.filter(t => t.direction === 'SELL');
    const buyWR  = buys.length  ? ((buys.filter(t => t.result === 'WIN').length  / buys.length)  * 100).toFixed(0) : '--';
    const sellWR = sells.length ? ((sells.filter(t => t.result === 'WIN').length / sells.length) * 100).toFixed(0) : '--';

    document.getElementById('dir-stats').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="background:var(--bg-2);border-radius:8px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="badge badge-buy">BUY</span>
            <span style="font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--green)">${buys.length} trades</span>
          </div>
          <div style="font-size:0.78rem;color:var(--text-2)">Win rate: <strong style="color:var(--green)">${buyWR}%</strong></div>
        </div>
        <div style="background:var(--bg-2);border-radius:8px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="badge badge-sell">SELL</span>
            <span style="font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--red)">${sells.length} trades</span>
          </div>
          <div style="font-size:0.78rem;color:var(--text-2)">Win rate: <strong style="color:var(--red)">${sellWR}%</strong></div>
        </div>
      </div>`;

    // ── Pair performance ──
    const pairMap = {};
    trades.forEach(t => {
      if (!pairMap[t.pair]) pairMap[t.pair] = { total:0, wins:0, rrArr:[] };
      pairMap[t.pair].total++;
      if (t.result === 'WIN') pairMap[t.pair].wins++;
      if (t.rr) pairMap[t.pair].rrArr.push(parseFloat(t.rr));
    });

    const pairArr = Object.entries(pairMap).map(([sym, d]) => ({
      sym,
      total: d.total,
      wins: d.wins,
      wr: ((d.wins / d.total) * 100).toFixed(0),
      avgRR: d.rrArr.length ? (d.rrArr.reduce((a,b)=>a+b,0)/d.rrArr.length).toFixed(2) : null,
    })).sort((a,b) => b.wr - a.wr);

    const best  = pairArr[0];
    const worst = pairArr[pairArr.length - 1];

    document.getElementById('pair-stats').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${pairArr.map((p, i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-2);border-radius:6px;${i===0?'border-left:2px solid var(--green)':i===pairArr.length-1?'border-left:2px solid var(--red)':''}">
            <span style="font-family:'Space Mono',monospace;font-weight:700;font-size:0.8rem;min-width:80px">${p.sym}</span>
            <span style="font-size:0.72rem;color:var(--text-3)">${p.total}t</span>
            <span style="margin-left:auto;font-family:'Space Mono',monospace;font-size:0.82rem;color:${parseFloat(p.wr)>=50?'var(--green)':'var(--red)'}">${p.wr}%</span>
          </div>`).join('')}
      </div>`;

    // ── Result distribution ──
    const maxBar = Math.max(wins, losses, bes, 1);
    document.getElementById('result-dist').innerHTML = `
      <div class="bar-row">
        <span class="bar-row-label">Wins</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(wins/maxBar)*100}%;background:var(--green)"></div></div>
        <span class="bar-val">${wins} (${wr}%)</span>
      </div>
      <div class="bar-row">
        <span class="bar-row-label">Losses</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(losses/maxBar)*100}%;background:var(--red)"></div></div>
        <span class="bar-val">${losses} (${((losses/total)*100).toFixed(0)}%)</span>
      </div>
      <div class="bar-row">
        <span class="bar-row-label">Breakevens</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(bes/maxBar)*100}%;background:var(--blue)"></div></div>
        <span class="bar-val">${bes} (${((bes/total)*100).toFixed(0)}%)</span>
      </div>`;

    // ── Monthly breakdown ──
    const monthMap = {};
    trades.forEach(t => {
      const key = getMonthKey(t.datetime);
      if (!monthMap[key]) monthMap[key] = { wins:0, losses:0, bes:0, total:0, rrArr:[] };
      monthMap[key].total++;
      if (t.result === 'WIN')  monthMap[key].wins++;
      if (t.result === 'LOSS') monthMap[key].losses++;
      if (t.result === 'BE')   monthMap[key].bes++;
      if (t.rr) monthMap[key].rrArr.push(parseFloat(t.rr));
    });

    const monthKeys = Object.keys(monthMap).sort().reverse();
    document.getElementById('monthly-tbody').innerHTML = monthKeys.map(k => {
      const m = monthMap[k];
      const mWR = ((m.wins / m.total) * 100).toFixed(0);
      const mRR = m.rrArr.length ? (m.rrArr.reduce((a,b)=>a+b,0)/m.rrArr.length).toFixed(2) : '--';
      return `<tr>
        <td class="mono" style="color:var(--gold)">${getMonthLabel(k)}</td>
        <td class="mono">${m.total}</td>
        <td class="mono" style="color:var(--green)">${m.wins}</td>
        <td class="mono" style="color:var(--red)">${m.losses}</td>
        <td class="mono" style="color:var(--blue)">${m.bes}</td>
        <td><span class="badge badge-${parseFloat(mWR)>=50?'win':'loss'}">${mWR}%</span></td>
        <td class="mono" style="color:var(--gold)">${mRR !== '--' ? '1:'+mRR : '--'}</td>
      </tr>`;
    }).join('');
  }

  render();
</script>
</body>
</html>
